<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>风格化岩石练习 | Stylized Rock Study</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

img{
width:100%;
display:block;
}

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(70%);
}

.hero-text{
position:absolute;
left:8%;
bottom:10%;
}

.hero-text h1{
font-size:90px;
font-weight:900;
line-height:1;
}

.hero-text p{
margin-top:20px;
font-size:20px;
color:#aaa;
letter-spacing:2px;
}

.info{
padding:120px 10%;
}

.info-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:60px;
}

.info h3{
font-size:14px;
color:#777;
margin-bottom:15px;
letter-spacing:2px;
}

.info p{
margin-bottom:8px;
}

.section{
padding:0 8% 120px;
}

.section h2{
font-size:40px;
margin-bottom:40px;
}

.main-image{
border-radius:12px;
overflow:hidden;
}

.footer{
padding:150px 0;
text-align:center;
}

.footer a{
color:white;
text-decoration:none;
border:1px solid #333;
padding:15px 40px;
transition:.3s;
}

.footer a:hover{
background:white;
color:black;
}

@media(max-width:900px){

.hero-text h1{
font-size:60px;
}

.info-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<section class="hero">

<img src="../images/stylized-rock/01.jpg">

<div class="hero-text">

<h1>
风格化岩石
</h1>

<p>
STYLIZED ROCK STUDY
</p>

</div>

</section>

<section class="info">

<div class="info-grid">

<div>

<h3>
制作软件 · SOFTWARE
</h3>

<p>ZBrush</p>
<p>Substance Painter</p>
<p>Marmoset Toolbag</p>

</div>

<div>

<h3>
项目类型 · CATEGORY
</h3>

<p>风格化资产</p>
<p>岩石练习</p>

</div>

<div>

<h3>
作者 · ARTIST
</h3>

<p>李佳键</p>

</div>

</div>

</section>

<section class="section">

<h2>
最终效果展示 · FINAL PRESENTATION
</h2>

<div class="main-image">

<img src="../images/stylized-rock/01.jpg">

</div>

</section>

<section class="section">

<h2>
细节展示 · DETAIL SHOTS
</h2>

<div class="main-image">

<img src="../images/stylized-rock/01.jpg">

</div>

</section>

<section class="footer">

</section>

</body>

</html>
